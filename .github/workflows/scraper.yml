name: Tagesmenü Scraper

on:
  schedule:
    - cron: '0 8 * * 1-5'  # Mo-Fr um 08:00 UTC = 10:00 Schweizer Zeit
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Puppeteer installieren
        run: |
          npm init -y
          npm install puppeteer
      - name: Menüs scrapen
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scraper.js
