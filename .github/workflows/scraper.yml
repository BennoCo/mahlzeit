name: Tagesmenü Scraper

on:
  schedule:
    - cron: '0 7 * * 1-5'  # Mo-Fr um 07:00 UTC = 08:00/09:00 Schweizer Zeit
  workflow_dispatch:         # Manuell auslösbar

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Menüs scrapen
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scraper.js
